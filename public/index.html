<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUPREME DEITY: CLOUD ORACLE - ULTRA FAST</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #0a0a0a;
            --text-main: #e0e0e0;
            --text-dim: #666;
            --accent-up: #00ff9d;
            --accent-down: #ff0055;
            --font-mono: 'Courier New', Courier, monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            padding: 10px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid #222;
            margin-bottom: 15px;
            gap: 10px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
        }

        .status-item {
            background: #111;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #222;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            flex: 1;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.3s ease;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .asset-name {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .market-link {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-decoration: none;
            border: 1px solid #333;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .prophecy-hud {
            text-align: center;
            margin-bottom: 15px;
            padding: 10px;
            background: #0f0f0f;
            border-radius: 6px;
            border: 1px solid #1a1a1a;
        }

        .signal-tier {
            font-size: 0.7rem;
            font-weight: 800;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            height: 1.2em;
        }

        .tier-conviction {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .tier-advisory {
            color: #00d4ff;
        }

        .signal-box {
            font-size: 1.8rem;
            font-weight: 900;
            margin: 5px 0;
            letter-spacing: -1px;
        }

        .confidence-bar {
            height: 4px;
            background: #222;
            border-radius: 2px;
            margin: 10px 0;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background 0.3s ease;
        }

        .edge-display {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-dim);
            min-height: 1.2em;
        }

        .ensemble-votes {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-top: 8px;
        }

        .data-block {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            margin-bottom: 12px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #111;
        }

        .label {
            color: var(--text-dim);
            font-size: 0.7rem;
        }

        .value {
            color: var(--text-main);
            font-weight: bold;
        }

        .odds-container {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .odds-box {
            flex: 1;
            padding: 8px;
            text-align: center;
            border-radius: 6px;
            background: #111;
            border: 1px solid #222;
        }

        .odds-title {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .odds-value {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .up {
            color: var(--accent-up);
        }

        .down {
            color: var(--accent-down);
        }

        .neutral {
            color: var(--text-dim);
        }

        .glow-up {
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.15);
            border-color: rgba(0, 255, 157, 0.4);
        }

        .glow-down {
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.15);
            border-color: rgba(255, 0, 85, 0.4);
        }

        @keyframes blink {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>⚡ SUPREME DEITY - CLOUD ⚡</h1>
        <div class="status-bar">
            <div class="status-item">STATUS: <span id="sys-status" class="blink">CONNECTING</span></div>
            <div class="status-item">NEXT: <span id="next-check">--:--</span></div>
            <div class="status-item">ACCURACY: <span id="global-acc">---%</span></div>
            <div class="status-item">MODE: <span id="evolution-mode">LEARNING</span></div>
        </div>
    </header>

    <div class="grid" id="card-grid"></div>

    <script>
        const ASSETS = ['BTC', 'ETH', 'SOL', 'XRP'];
        const INTERVAL_SECONDS = 900;

        async function update() {
            try {
                const res = await fetch('/api/state');
                const data = await res.json();
                renderCards(data);
                document.getElementById('sys-status').innerText = "ONLINE";
                document.getElementById('sys-status').style.color = "#00ff9d";
            } catch (e) {
                document.getElementById('sys-status').innerText = "OFFLINE";
                document.getElementById('sys-status').style.color = "#ff0055";
            }
        }

        function initGrid(grid) {
            ASSETS.forEach(asset => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${asset}`;
                card.innerHTML = `
                    <div class="card-header">
                        <div class="asset-name">${asset}</div>
                        <a href="#" target="_blank" class="market-link" id="link-${asset}">MARKET ↗</a>
                    </div>
                    
                    <div class="prophecy-hud">
                        <div class="signal-tier" id="tier-${asset}"></div>
                        <div class="signal-box" id="signal-${asset}">WAITING</div>
                        <div class="confidence-bar"><div class="confidence-fill" id="conf-${asset}"></div></div>
                        <div class="edge-display" id="edge-${asset}"></div>
                        <div class="ensemble-votes" id="votes-${asset}"></div>
                    </div>

                    <div class="data-block">
                        <div class="data-row"><span class="label">CHECKPOINT</span><span class="value" id="cp-${asset}">---</span></div>
                        <div class="data-row"><span class="label">LIVE</span><span class="value" id="live-${asset}">---</span></div>
                        <div class="data-row"><span class="label">GAP</span><span class="value" id="gap-${asset}">---</span></div>
                        <div class="data-row"><span class="label">RECORD</span><span class="value" id="record-${asset}">0/0</span></div>
                        <div class="data-row"><span class="label">ACCURACY</span><span class="value" id="acc-${asset}">---%</span></div>
                        <div class="data-row"><span class="label">EDGE</span><span class="value" id="edge2-${asset}">---</span></div>
                    </div>

                    <div class="odds-container">
                        <div class="odds-box">
                            <div class="odds-title">YES ODDS</div>
                            <div class="odds-value up" id="yes-odds-${asset}">---%</div>
                        </div>
                        <div class="odds-box">
                            <div class="odds-title">NO ODDS</div>
                            <div class="odds-value down" id="no-odds-${asset}">---%</div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderCards(data) {
            const grid = document.getElementById('card-grid');
            if (grid.innerHTML === '') initGrid(grid);

            let totalWins = 0;
            let totalGames = 0;

            ASSETS.forEach(asset => {
                const brain = data[asset];
                if (!brain) return;

                const live = brain.live;
                const cp = brain.checkpoint;
                const market = brain.market;

                // Update prices
                if (live) document.getElementById(`live-${asset}`).innerText = live.toFixed(2);
                if (cp) document.getElementById(`cp-${asset}`).innerText = cp.toFixed(2);

                // Calculate gap
                if (live && cp) {
                    const diff = live - cp;
                    const pct = (diff / cp) * 100;
                    const gapEl = document.getElementById(`gap-${asset}`);
                    gapEl.innerText = `${diff > 0 ? '+' : ''}${pct.toFixed(3)}%`;
                    gapEl.className = `value ${diff > 0 ? 'up' : 'down'}`;
                }

                // Update stats
                const wins = brain.stats.wins || 0;
                const total = brain.stats.total || 0;
                document.getElementById(`record-${asset}`).innerText = `${wins}/${total}`;

                const acc = total > 0 ? ((wins / total) * 100).toFixed(0) : '---';
                document.getElementById(`acc-${asset}`).innerText = `${acc}%`;

                totalWins += wins;
                totalGames += total;

                // Market link
                if (market) {
                    document.getElementById(`link-${asset}`).href = market.marketUrl;

                    // Update odds
                    document.getElementById(`yes-odds-${asset}`).innerText = `${(market.yesPrice * 100).toFixed(1)}%`;
                    document.getElementById(`no-odds-${asset}`).innerText = `${(market.noPrice * 100).toFixed(1)}%`;
                }

                // Signal elements
                const signalEl = document.getElementById(`signal-${asset}`);
                const confFill = document.getElementById(`conf-${asset}`);
                const edgeEl = document.getElementById(`edge-${asset}`);
                const edge2El = document.getElementById(`edge2-${asset}`);
                const tierEl = document.getElementById(`tier-${asset}`);
                const votesEl = document.getElementById(`votes-${asset}`);
                const card = document.getElementById(`card-${asset}`);

                if (brain.prediction === 'UP') {
                    signalEl.innerText = "BUY UP";
                    signalEl.className = "signal-box up blink";
                    confFill.style.width = `${(brain.confidence * 100)}%`;
                    confFill.style.background = "#00ff9d";
                    tierEl.innerText = brain.tier === 'CONVICTION' ? "🔥 CONVICTION" : "⚡ ADVISORY";
                    tierEl.className = brain.tier === 'CONVICTION' ? "signal-tier tier-conviction" : "signal-tier tier-advisory";
                    card.className = brain.tier === 'CONVICTION' ? "card glow-up" : "card";
                } else if (brain.prediction === 'DOWN') {
                    signalEl.innerText = "BUY DOWN";
                    signalEl.className = "signal-box down blink";
                    confFill.style.width = `${(brain.confidence * 100)}%`;
                    confFill.style.background = "#ff0055";
                    tierEl.innerText = brain.tier === 'CONVICTION' ? "🔥 CONVICTION" : "⚡ ADVISORY";
                    tierEl.className = brain.tier === 'CONVICTION' ? "signal-tier tier-conviction" : "signal-tier tier-advisory";
                    card.className = brain.tier === 'CONVICTION' ? "card glow-down" : "card";
                } else {
                    signalEl.innerText = "ANALYZING";
                    signalEl.className = "signal-box neutral";
                    confFill.style.width = "0%";
                    tierEl.innerText = "";
                    card.className = "card";
                }

                if (brain.edge > 0) {
                    edgeEl.innerText = `Edge: +${brain.edge.toFixed(1)}%`;
                    edge2El.innerText = `+${brain.edge.toFixed(1)}%`;
                    edge2El.className = "value up";
                } else if (brain.edge < 0) {
                    edgeEl.innerText = `Edge: ${brain.edge.toFixed(1)}%`;
                    edge2El.innerText = `${brain.edge.toFixed(1)}%`;
                    edge2El.className = "value down";
                } else {
                    edgeEl.innerText = "";
                    edge2El.innerText = "---";
                    edge2El.className = "value";
                }

                votesEl.innerText = `Ensemble: ${brain.votes.UP.toFixed(1)} UP | ${brain.votes.DOWN.toFixed(1)} DOWN`;
            });

            // Update global accuracy
            const globalAcc = totalGames > 0 ? ((totalWins / totalGames) * 100).toFixed(0) : '---';
            document.getElementById('global-acc').innerText = `${globalAcc}%`;
        }

        // Update countdown timer
        function updateTimer() {
            const now = Math.floor(Date.now() / 1000);
            const currentCheckpoint = now - (now % INTERVAL_SECONDS);
            const nextCheckpoint = currentCheckpoint + INTERVAL_SECONDS;
            const remaining = nextCheckpoint - now;

            const mins = Math.floor(remaining / 60);
            const secs = remaining % 60;
            document.getElementById('next-check').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        setInterval(update, 1000);
        setInterval(updateTimer, 1000);
    </script>
</body>

</html>
