services:
  - type: web
    name: polyprophet
    runtime: node
    plan: free
    region: oregon
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRADE_MODE
        value: PAPER
      - key: ENABLE_LIVE_TRADING
        value: "false"
      - key: LIVE_AUTOTRADING_ENABLED
        value: "false"
      - key: PAPER_BALANCE
        value: "5.00"
      - key: MAX_POSITION_SIZE
        value: "0.32"
      - key: ASSETS
        value: BTC,ETH,SOL,XRP
      - key: TIMEFRAME_15M_ENABLED
        value: "true"
      - key: TIMEFRAME_5M_ENABLED
        value: "true"
      - key: MULTIFRAME_4H_ENABLED
        value: "true"
      - key: TIMEFRAME_4H_MIN_BANKROLL
        value: "10"
      - key: TIMEFRAME_5M_MIN_BANKROLL
        value: "50"
      - key: STRATEGY_SET_15M_PATH
        value: debug/strategy_set_top7_drop6_per_asset_lcb60_min12.json
      - key: STRATEGY_SET_4H_PATH
        value: debug/strategy_set_4h_maxprofit.json
      - key: STRATEGY_SET_5M_PATH
        value: debug/strategy_set_5m_maxprofit.json
      - key: DEFAULT_MIN_ORDER_SHARES
        value: "5"
