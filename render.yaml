services:
  - type: web
    name: polyprophet
    runtime: node
    plan: free
    region: oregon
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRADE_MODE
        value: PAPER
      - key: ENABLE_LIVE_TRADING
        value: "false"
      - key: LIVE_AUTOTRADING_ENABLED
        value: "false"
      - key: PAPER_BALANCE
        value: "10"
      - key: STARTING_BALANCE
        value: "10"
      - key: OPERATOR_STAKE_FRACTION
        value: "0.25"
      - key: ASSETS
        value: BTC,ETH,SOL,XRP
      - key: TIMEFRAME_15M_ENABLED
        value: "true"
      - key: TIMEFRAME_15M_MIN_BANKROLL
        value: "3"
      - key: TIMEFRAME_5M_ENABLED
        value: "false"
      - key: MULTIFRAME_4H_ENABLED
        value: "false"
      - key: TIMEFRAME_4H_MIN_BANKROLL
        value: "10"
      - key: TIMEFRAME_5M_MIN_BANKROLL
        value: "50"
      - key: STRATEGY_SET_15M_PATH
        value: strategies/strategy_set_15m_optimal_10usd_v3.json
      - key: STRATEGY_SET_4H_PATH
        value: debug/strategy_set_4h_maxprofit.json
      - key: STRATEGY_SET_5M_PATH
        value: debug/strategy_set_5m_walkforward_top4.json
      - key: POLYMARKET_SIGNATURE_TYPE
        value: "1"
      - key: POLYMARKET_AUTO_DERIVE_CREDS
        value: "true"
      - key: CLOB_FORCE_PROXY
        value: "1"
      - key: DEFAULT_MIN_ORDER_SHARES
        value: "5"
      - key: REQUIRE_REAL_ORDERBOOK
        value: "true"
      - key: ENTRY_PRICE_BUFFER_CENTS
        value: "0"
      - key: ENFORCE_NET_EDGE_GATE
        value: "true"
      - key: HIGH_PRICE_EDGE_FLOOR_PRICE
        value: "0.90"
      - key: MAX_GLOBAL_TRADES_PER_CYCLE
        value: "1"
      - key: START_PAUSED
        value: "false"
      - key: MAX_TOTAL_EXPOSURE
        value: "0"
      - key: MAX_TOTAL_EXPOSURE_MIN_BANKROLL
        value: "50"
      - key: RISK_ENVELOPE_ENABLED
        value: "false"
      - key: RISK_ENVELOPE_MIN_BANKROLL
        value: "100"
      - key: MAX_ABSOLUTE_STAKE_SMALL
        value: "100000"
      - key: MAX_ABSOLUTE_STAKE_MEDIUM
        value: "100000"
      - key: MAX_ABSOLUTE_STAKE_LARGE
        value: "100000"
      - key: VAULT_TRIGGER_BALANCE
        value: "100"
      - key: STAGE2_THRESHOLD
        value: "1000"
