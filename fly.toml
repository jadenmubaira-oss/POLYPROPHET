# POLYPROPHET Fly.io Configuration
# Region: São Paulo, Brazil

app = "polyprophet"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  START_PAUSED = "true"
  SKIP_RECOVERY_QUEUE_GATE = "true"
  TRADE_MODE = "LIVE"
  ENABLE_LIVE_TRADING = "false"
  LIVE_AUTOTRADING_ENABLED = "false"
  ASSETS = "BTC,ETH,SOL,XRP,BNB,DOGE"
  TIMEFRAME_15M_ENABLED = "true"
  TIMEFRAME_15M_MIN_BANKROLL = "3"
  TIMEFRAME_5M_ENABLED = "false"
  TIMEFRAME_5M_MIN_BANKROLL = "3"
  MULTIFRAME_4H_ENABLED = "false"
  STRATEGY_SET_5M_PATH = ""
  STRATEGY_SET_15M_PATH = "strategies/strategy_set_15m_robust_8signal_portfolio.json"
  STRUCTURAL_SIGNAL_REQUIRE_CLOSED_CANDLE = "false"
  POLYMARKET_SIGNATURE_TYPE = "3"
  POLYMARKET_AUTO_DERIVE_CREDS = "true"
  TELEGRAM_FLY_SECRETS_ENABLED = "true"
  TELEGRAM_FLY_APP_NAME = "polyprophet"
  CLOB_FORCE_PROXY = "0"
  PRIMARY_REGION = "gru"
  DEFAULT_MIN_ORDER_SHARES = "5"
  REQUIRE_REAL_ORDERBOOK = "true"
  HARD_ENTRY_PRICE_CAP = "0.72"
  ENFORCE_HIGH_PRICE_EDGE_FLOOR = "false"
  HIGH_PRICE_EDGE_FLOOR_PRICE = "0.90"
  ENFORCE_NET_EDGE_GATE = "true"
  MIN_NET_EDGE_ROI = "0.015"
  MAX_GLOBAL_TRADES_PER_CYCLE = "1"
  ALLOW_MICRO_MPC_OVERRIDE = "true"
  ALLOW_MICRO_5M = "true"
  OPERATOR_STAKE_FRACTION = "1.00"
  KELLY_FRACTION = "0.75"
  KELLY_MAX_FRACTION = "0.75"
  MICRO_BOOTSTRAP_STAKE_FRACTION = "0.75"
  REDIS_ENABLED = "false"
  CYCLE_RECORDER_ENABLED = "true"
  CYCLE_RECORDER_PATH = "/data/cycle_recorder.jsonl"
  CYCLE_RECORD_EXTRA_MINUTES = "10"
  RUNTIME_STATE_PATH = "/data/runtime-state.json"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[[mounts]]
  source = "polyprophet_data"
  destination = "/data"
